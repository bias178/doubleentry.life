<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Double Entry Life</title>
  <meta name="description" content="A financial reporting system rendered as editorial content. Bill is 26. His ledger is open." />
  <meta property="og:title" content="Double Entry Life" />
  <meta property="og:description" content="A financial reporting system rendered as editorial content. Bill is 26. His ledger is open." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://doubleentry.life" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       TOKENS
    ============================================================ */
    :root {
      --teal:       #2a7a7a;
      --teal-light: #e6f2f2;
      --teal-mid:   #c0dede;
      --red:        #c0392b;
      --green:      #1a6b3c;
      --ink:        #1a1a1a;
      --ink-muted:  #5a5a6a;
      --paper:      #fafaf8;
      --neutral:    #6b6b7a;
      --rule:       #e2e2e0;
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-mono:  'IBM Plex Mono', monospace;
      --font-sans:  'Inter', system-ui, sans-serif;
      --max-w:      1080px;
      --col:        660px;
    }

    /* ============================================================
       RESET
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--paper);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ============================================================
       NAV
    ============================================================ */
    .nav {
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--paper);
    }
    .nav-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--teal);
    }
    .nav-logo span { color: var(--ink); }
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--neutral);
      transition: color 0.15s;
    }
    .nav-links a:hover,
    .nav-links a[aria-current="page"] { color: var(--teal); }
    .nav-hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      flex-direction: column;
      gap: 5px;
    }
    .nav-hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--ink);
    }
    .nav-mobile {
      display: none;
      position: absolute;
      top: 56px;
      left: 0;
      right: 0;
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      padding: 1.5rem 2rem;
      z-index: 99;
    }
    .nav-mobile.open { display: block; }
    .nav-mobile ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .nav-mobile a {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--neutral);
    }

    /* ============================================================
       BLOCK 1: HERO
    ============================================================ */
    .hero {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 5rem 2rem 4rem;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 4rem;
      align-items: center;
    }
    .hero-copy {}
    .hero-system-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 1.75rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .hero-system-label::before {
      content: '';
      display: inline-block;
      width: 20px;
      height: 1px;
      background: var(--teal);
    }
    .hero-headline {
      font-family: var(--font-serif);
      font-size: clamp(2.4rem, 5vw, 3.5rem);
      line-height: 1.08;
      color: var(--ink);
      margin-bottom: 1.75rem;
    }
    .hero-headline em {
      font-style: italic;
      color: var(--teal);
    }
    .hero-subhead {
      font-size: 1rem;
      color: var(--ink-muted);
      line-height: 1.75;
      max-width: 44ch;
      margin-bottom: 2.5rem;
    }
    .hero-actions {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .btn-primary {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--paper);
      background: var(--teal);
      padding: 0.8rem 1.5rem;
      border-radius: 2px;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #1f5e5e; }
    .btn-ghost {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--teal);
      border-bottom: 1px solid var(--teal-mid);
      padding-bottom: 2px;
      transition: border-color 0.15s;
    }
    .btn-ghost:hover { border-color: var(--teal); }

    /* Tamagotchi hero: static display, vitals animate on load */
    .hero-tama {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100%;
    }
    .tama-device {
      width: 100%;
      background: white;
      border-radius: 2.4rem;
      border: 1px solid #ddd;
      box-shadow: 0 2px 4px rgba(0,0,0,.05), 0 8px 24px rgba(0,0,0,.09);
      overflow: hidden;
    }
    /* Top bar */
    .tama-topbar {
      background: var(--teal);
      padding: 0.7rem 1rem 0.6rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .tama-topbar-label {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      text-align: center;
    }
    /* Screen: horizontal layout */
    .tama-screen {
      background: #f4f8f8;
      margin: 0.6rem;
      border-radius: 1rem;
      padding: 0.9rem;
      border: 1px solid #d4e8e8;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 1rem;
    }
    .tama-screen-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      width: 84px;
    }
    .tama-bill-img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .tama-bill-name {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      color: var(--teal);
      letter-spacing: 0.2em;
      margin-top: 0.25rem;
      font-weight: 700;
    }
    .tama-bill-mood {
      font-family: var(--font-mono);
      font-size: 0.46rem;
      color: var(--neutral);
      margin-top: 0.1rem;
      text-align: center;
    }
    .tama-vitals {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .tama-vital-row {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .tama-vital-label {
      font-family: var(--font-mono);
      font-size: 0.5rem;
      color: var(--neutral);
      width: 48px;
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }
    .tama-vital-track {
      flex: 1;
      height: 6px;
      background: var(--rule);
      border-radius: 3px;
      overflow: hidden;
    }
    .tama-vital-fill {
      height: 100%;
      border-radius: 3px;
      width: 0;
      transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    }
    .tama-vital-val {
      font-family: var(--font-mono);
      font-size: 0.5rem;
      width: 26px;
      text-align: right;
      flex-shrink: 0;
      font-weight: 700;
    }
    /* Toggle button */
    .tama-toggle {
      width: 100%;
      background: var(--teal-light);
      border: none;
      border-top: 1px solid var(--teal-mid);
      border-bottom: 1px solid var(--teal-mid);
      padding: 0.5rem 0.85rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--teal);
      transition: background 0.15s;
    }
    .tama-toggle:hover { background: var(--teal-mid); }
    .tama-toggle-icon { font-size: 0.5rem; }
    .tama-detail { border-top: 1px solid var(--rule); }
    /* Tabs strip */
    .tama-tabs-strip {
      display: flex;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      background: white;
    }
    .tama-tab-btn {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 0.48rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.45rem 0;
      border: none;
      border-right: 1px solid var(--rule);
      background: transparent;
      color: var(--neutral);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .tama-tab-btn:last-child { border-right: none; }
    .tama-tab-btn.active { background: var(--teal); color: white; }
    /* Panels */
    .tama-panel { display: none; padding: 0.7rem 0.85rem; }
    .tama-panel.active { display: block; }
    .tama-panel-lbl {
      font-family: var(--font-mono);
      font-size: 0.48rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--neutral);
      margin-bottom: 0.4rem;
      padding-bottom: 0.2rem;
      border-bottom: 2px solid var(--teal);
    }
    /* Ledger table */
    .tama-tbl { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 0.6rem; }
    .tama-tbl tr { border-bottom: 1px solid #f0ede8; }
    .tama-tbl td { padding: 0.28rem 0.2rem; }
    .tama-tbl td:last-child { text-align: right; }
    .tama-tbl tr.focus td { background: var(--teal-light); font-weight: 600; color: var(--teal); }
    .tama-tbl tr.ttl td { font-weight: 600; border-top: 2px solid var(--teal); padding-top: 0.32rem; }
    .tama-tbl tr.muted td { color: var(--neutral); font-size: 0.55rem; }
    .tama-tbl .pos { color: var(--green); }
    .tama-tbl .neg { color: var(--red); }
    .tama-tbl .neu { color: var(--neutral); }
    /* Vitals grid */
    .tama-vgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .tama-vcard { background: #f7f5f2; border: 1px solid var(--rule); padding: 0.5rem; }
    .tama-vname { font-family: var(--font-mono); font-size: 0.44rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--neutral); margin-bottom: 0.2rem; }
    .tama-vtrack { height: 4px; background: var(--rule); position: relative; margin-bottom: 0.16rem; border-radius: 2px; }
    .tama-vbefore { position: absolute; height: 100%; background: #ccc; border-radius: 2px; transition: width 0.8s ease; }
    .tama-vafter { position: absolute; height: 100%; border-radius: 2px; transition: width 1.2s ease; }
    .tama-vvals { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 0.44rem; }
    .tama-vvals .neg { color: var(--red); font-weight: 600; }
    /* Insight */
    .tama-ibox { background: var(--teal); color: white; padding: 0.75rem; margin-bottom: 0.5rem; border-radius: 0.35rem; }
    .tama-ilbl { font-family: var(--font-mono); font-size: 0.46rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,.6); margin-bottom: 0.3rem; }
    .tama-itxt { font-size: 0.65rem; line-height: 1.6; color: rgba(255,255,255,.85); }
    .tama-itxt strong { color: white; }
    .tama-bio { font-family: var(--font-mono); font-size: 0.48rem; color: var(--neutral); line-height: 1.6; }
    /* Bottom bar */
    .tama-botbar { background: var(--teal); padding: 0.4rem 1rem; display: flex; justify-content: center; }
    .tama-botbar-txt { font-family: var(--font-mono); font-size: 0.48rem; color: rgba(255,255,255,.7); letter-spacing: 0.1em; text-transform: uppercase; }
    /* Buttons */
    .tama-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.2rem;
      padding: 0.65rem 0 0.75rem;
      background: white;
      border-top: 1px solid var(--rule);
    }
    .tama-btn-phys {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f0ede8;
      border: 1px solid var(--rule);
      box-shadow: 0 2px 4px rgba(0,0,0,.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 0.52rem;
      color: var(--neutral);
      cursor: pointer;
      user-select: none;
    }
    .tama-btn-phys.center {
      width: 34px;
      height: 34px;
      background: var(--teal);
      color: white;
      border-color: var(--teal);
    }
    .tama-home-indicator {
      height: 4px;
      width: 70px;
      background: var(--rule);
      border-radius: 2px;
      margin: 0.35rem auto 0.45rem;
    }
    .hero-tama-caption {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--neutral);
      letter-spacing: 0.06em;
      margin-top: 1rem;
      text-align: center;
      align-self: center;
    }

    /* ============================================================
       SECTION DIVIDER
    ============================================================ */
    .divider {
      max-width: var(--max-w);
      margin: 0 auto;
      border: none;
      border-top: 1px solid var(--rule);
    }

    /* ============================================================
       BLOCK 2: THE PROBLEM
    ============================================================ */
    .problem {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 4rem 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }
    .problem-left {}
    .problem-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--neutral);
      margin-bottom: 1.25rem;
    }
    .problem-statement {
      font-family: var(--font-serif);
      font-size: clamp(1.4rem, 2.5vw, 1.85rem);
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 1.5rem;
    }
    .problem-body {
      font-size: 0.95rem;
      color: var(--ink-muted);
      line-height: 1.8;
    }
    .problem-right {
      background: white;
      border: 1px solid var(--rule);
    }
    .problem-ledger-header {
      background: var(--teal);
      padding: 0.85rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .problem-ledger-title {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
    }
    .problem-ledger-period {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      color: rgba(255,255,255,0.5);
    }
    .problem-ledger-rows {
      padding: 0.25rem 0;
    }
    .ledger-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.65rem 1.25rem;
      border-bottom: 1px solid var(--rule);
    }
    .ledger-row:last-child { border-bottom: none; }
    .ledger-row.highlight {
      background: var(--teal-light);
    }
    .ledger-row-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--neutral);
      letter-spacing: 0.03em;
    }
    .ledger-row-val {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--ink);
    }
    .ledger-row-val.neg { color: var(--red); }
    .ledger-row-val.pos { color: var(--green); }
    .ledger-row-val.note {
      font-size: 0.6rem;
      color: var(--neutral);
      font-style: italic;
    }
    .ledger-divider {
      border: none;
      border-top: 1px solid var(--teal-mid);
      margin: 0.1rem 1.25rem;
    }

    /* ============================================================
       BLOCK 3: HOW THE SYSTEM WORKS
    ============================================================ */
    .system {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 4rem 2rem;
    }
    .system-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--neutral);
      margin-bottom: 2.5rem;
    }
    .system-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: var(--rule);
      border: 1px solid var(--rule);
    }
    .system-cell {
      background: var(--paper);
      padding: 2rem 1.75rem 2.25rem;
    }
    .system-cell-object {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 1rem;
    }
    .system-cell-title {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      color: var(--ink);
      line-height: 1.2;
      margin-bottom: 0.75rem;
    }
    .system-cell-body {
      font-size: 0.85rem;
      color: var(--ink-muted);
      line-height: 1.7;
    }
    .system-cell-example {
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--rule);
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--neutral);
      letter-spacing: 0.04em;
    }

    /* ============================================================
       BLOCK 4: FY ARCHIVE
    ============================================================ */
    .archive {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 4rem 2rem;
    }
    .archive-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--neutral);
      margin-bottom: 2.5rem;
    }
    .archive-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: var(--rule);
      border: 1px solid var(--rule);
    }
    .archive-card {
      background: white;
      display: block;
      transition: background 0.15s;
    }
    .archive-card:hover { background: var(--teal-light); }
    .archive-card-header {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .archive-card-fy {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--teal);
    }
    .archive-card-status {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      border-radius: 2px;
    }
    .archive-card-status.closed {
      background: va

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Double Entry Life — Bill is learning how life adds up</title>
  <meta name="description" content="Accounting concepts applied to everyday decisions. Meet Bill — a 38-year-old learning to read his own ledger.">

  <link rel="stylesheet" href="/assets/css/style.css">

  <style>
    /* ISOLAMENTO CSS BILL */
    #bill-home * { box-sizing: border-box; margin: 0; padding: 0; }

    #bill-home {
      --teal: #2a7a7a;
      --teal-light: #e6f2f2;
      --teal-mid: #c0dede;
      --accent: #c0392b;
      --ink: #1a1a1a;
      --paper: #fafaf8;
      --warm-white: #ffffff;
      --rule: #e8e5e0;
      --neutral: #6b6b7a;
      --ledger-bg: #f5f3ef;
      --serif: 'DM Serif Display', Georgia, serif;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Inter', system-ui, sans-serif;
      font-family: var(--sans);
      background: var(--paper);
      color: var(--ink);
    }

    #bill-home nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(250,250,248,.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--rule);
      padding: .8rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }

    #bill-home .nav-brand {
      font-family: var(--mono);
      font-size: .7rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--teal);
      text-decoration: none;
      font-weight: 600;
    }

    #bill-home .nav-links {
      display: flex; gap: 2rem; list-style: none;
    }

    #bill-home .nav-links a {
      font-family: var(--mono);
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--neutral);
      text-decoration: none;
      transition: color .2s;
    }

    #bill-home .nav-links a:hover { color: var(--teal); }

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Double Entry Life</title>
  <meta name="description" content="A financial reporting system rendered as editorial content. Bill is 38. His ledger is open." />
  <meta property="og:title" content="Double Entry Life" />
  <meta property="og:description" content="A financial reporting system rendered as editorial content. Bill is 38. His ledger is open." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://doubleentry.life" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       TOKENS
    ============================================================ */
    :root {
      --teal:       #2a7a7a;
      --teal-light: #e6f2f2;
      --teal-mid:   #c0dede;
      --red:        #c0392b;
      --green:      #1a6b3c;
      --ink:        #1a1a1a;
      --ink-muted:  #5a5a6a;
      --paper:      #fafaf8;
      --neutral:    #6b6b7a;
      --rule:       #e2e2e0;
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-mono:  'IBM Plex Mono', monospace;
      --font-sans:  'Inter', system-ui, sans-serif;
      --max-w:      1080px;
      --col:        660px;
    }

    /* ============================================================
       RESET
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--paper);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ============================================================
       NAV
    ============================================================ */
    .nav {
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--paper);
    }
    .nav-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--teal);
    }
    .nav-logo span { color: var(--ink); }
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--neutral);
      transition: color 0.15s;
    }
    .nav-links a:hover,
    .nav-links a[aria-current="page"] { color: var(--teal); }
    .nav-hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      flex-direction: column;
      gap: 5px;
    }
    .nav-hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--ink);
    }
    .nav-mobile {
      display: none;
      position: absolute;
      top: 56px;
      left: 0;
      right: 0;
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      padding: 1.5rem 2rem;
      z-index: 99;
    }
    .nav-mobile.open { display: block; }
    .nav-mobile ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .nav-mobile a {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--neutral);
    }

    /* ============================================================
       BLOCK 1: HERO
    ============================================================ */
    .hero {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 5rem 2rem 4rem;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 5rem;
      align-items: center;
    }
    .hero-copy {}
    .hero-system-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 1.75rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .hero-system-label::before {
      content: '';
      display: inline-block;
      width: 20px;
      height: 1px;
      background: var(--teal);
    }
    .hero-headline {
      font-family: var(--font-serif);
      font-size: clamp(2.4rem, 5vw, 3.5rem);
      line-height: 1.08;
      color: var(--ink);
      margin-bottom: 1.75rem;
    }
    .hero-headline em {
      font-style: italic;
      color: var(--teal);
    }
    .hero-subhead {
      font-size: 1rem;
      color: var(--ink-muted);
      line-height: 1.75;
      max-width: 44ch;
      margin-bottom: 2.5rem;
    }
    .hero-actions {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .btn-primary {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--paper);
      background: var(--teal);
      padding: 0.8rem 1.5rem;
      border-radius: 2px;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #1f5e5e; }
    .btn-ghost {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--teal);
      border-bottom: 1px solid var(--teal-mid);
      padding-bottom: 2px;
      transition: border-color 0.15s;
    }
    .btn-ghost:hover { border-color: var(--teal); }

    /* Tamagotchi hero: static display, vitals animate on load */
    .hero-tama {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .tama-device {
      width: 220px;
      background: white;
      border-radius: 2.4rem;
      border: 2px solid var(--teal-mid);
      box-shadow: 0 8px 40px rgba(42,122,122,0.12);
      padding: 0.75rem;
    }
    .tama-screen {
      background: #f4f8f8;
      border: 1px solid var(--teal-mid);
      border-radius: 1rem;
      padding: 1rem;
      min-height: 260px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .tama-screen-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.25rem;
    }
    .tama-screen-label {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--teal);
    }
    .tama-screen-ep {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      color: var(--neutral);
    }
    /* Bill avatar placeholder */
    .tama-avatar {
      background: var(--teal-light);
      border-radius: 0.5rem;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.5rem;
      border: 1px solid var(--teal-mid);
    }
    .tama-avatar-inner {
      font-family: var(--font-mono);
      font-size: 0.5rem;
      color: var(--teal);
      letter-spacing: 0.06em;
      text-align: center;
      line-height: 1.6;
    }
    /* Vitals bars - these animate on page load */
    .tama-vitals {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .tama-vital-row {}
    .tama-vital-meta {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 0.52rem;
      color: var(--neutral);
      margin-bottom: 0.25rem;
      letter-spacing: 0.04em;
    }
    .tama-vital-track {
      height: 5px;
      background: var(--rule);
      border-radius: 3px;
      overflow: hidden;
    }
    .tama-vital-fill {
      height: 100%;
      background: var(--teal);
      border-radius: 3px;
      width: 0;
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* Buttons */
    .tama-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.85rem;
      padding: 0.6rem 0 0.25rem;
    }
    .tama-btn-phys {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #ebebeb;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 0.5rem;
      color: var(--neutral);
    }
    .tama-btn-phys.center {
      width: 32px;
      height: 32px;
      background: var(--teal);
      color: white;
    }
    .hero-tama-caption {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--neutral);
      letter-spacing: 0.06em;
      margin-top: 1rem;
      text-align: center;
    }

    /* ============================================================
       SECTION DIVIDER
    ============================================================ */
    .divider {
      max-width: var(--max-w);
      margin: 0 auto;
      border: none;
      border-top: 1px solid var(--rule);
    }

    /* ============================================================
       BLOCK 2: THE PROBLEM
    ============================================================ */
    .problem {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 4rem 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }
    .problem-left {}
    .problem-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--neutral);
      margin-bottom: 1.25rem;
    }
    .problem-statement {
      font-family: var(--font-serif);
      font-size: clamp(1.4rem, 2.5vw, 1.85rem);
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 1.5rem;
    }
    .problem-body {
      font-size: 0.95rem;
      color: var(--ink-muted);
      line-height: 1.8;
    }
    .problem-right {
      background: white;
      border: 1px solid var(--rule);
    }
    .problem-ledger-header {
      background: var(--teal);
      padding: 0.85rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .problem-ledger-title {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
    }
    .problem-ledger-period {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      color: rgba(255,255,255,0.5);
    }
    .problem-ledger-rows {
      padding: 0.25rem 0;
    }
    .ledger-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.65rem 1.25rem;
      border-bottom: 1px solid var(--rule);
    }
    .ledger-row:last-child { border-bottom: none; }
    .ledger-row.highlight {
      background: var(--teal-light);
    }
    .ledger-row-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--neutral);
      letter-spacing: 0.03em;
    }
    .ledger-row-val {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--ink);
    }
    .ledger-row-val.neg { color: var(--red); }
    .ledger-row-val.pos { color: var(--green); }
    .ledger-row-val.note {
      font-size: 0.6rem;
      color: var(--neutral);
      font-style: italic;
    }
    .ledger-divider {
      border: none;
      border-top: 1px solid var(--teal-mid);
      margin: 0.1rem 1.25rem;
    }

    /* ============================================================
       BLOCK 3: HOW THE SYSTEM WORKS
    ============================================================ */
    .system {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 4rem 2rem;
    }
    .system-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--neutral);
      margin-bottom: 2.5rem;
    }
    .system-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: var(--rule);
      border: 1px solid var(--rule);
    }
    .system-cell {
      background: var(--paper);
      padding: 2rem 1.75rem 2.25rem;
    }
    .system-cell-object {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 1rem;
    }
    .system-cell-title {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      color: var(--ink);
      line-height: 1.2;
      margin-bottom: 0.75rem;
    }
    .system-cell-body {
      font-size: 0.85rem;
      color: var(--ink-muted);
      line-height: 1.7;
    }
    .system-cell-example {
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--rule);
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--neutral);
      letter-spacing: 0.04em;
    }

    /* ============================================================
       BLOCK 4: FY ARCHIVE
    ============================================================ */
    .archive {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 4rem 2rem;
    }
    .archive-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--neutral);
      margin-bottom: 2.5rem;
    }
    .archive-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: var(--rule);
      border: 1px solid var(--rule);
    }
    .archive-card {
      background: white;
      display: block;
      transition: background 0.15s;
    }
    .archive-card:hover { background: var(--teal-light); }
    .archive-card-header {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .archive-card-fy {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--teal);
    }
    .archive-card-status {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      border-radius: 2px;
    }
    .archive-card-status.closed {
      background: var(--rule);
      color: var(--neutral);
    }
    .archive-card-status.active {
      background: var(--teal-light);
      color: var(--teal);
    }
    .archive-card-body {
      padding: 1.25rem 1.5rem;
    }
    .archive-card-season {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      color: var(--ink);
      margin-bottom: 0.4rem;
      line-height: 1.2;
    }
    .archive-card-period {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--neutral);
      margin-bottom: 1rem;
    }
    .archive-card-stats {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .archive-card-stat {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 0.6rem;
    }
    .archive-card-stat-label { color: var(--neutral); }
    .archive-card-stat-val { color: var(--ink); }
    .archive-card-footer {
      padding: 0.85rem 1.5rem;
      border-top: 1px solid var(--rule);
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--teal);
      letter-spacing: 0.05em;
    }

    /* ============================================================
       BLOCK 5: BILL BASELINE
    ============================================================ */
    .bill {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: start;
    }
    .bill-copy {}
    .bill-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--neutral);
      margin-bottom: 1.25rem;
    }
    .bill-headline {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 3vw, 2rem);
      line-height: 1.15;
      color: var(--ink);
      margin-bottom: 1.25rem;
    }
    .bill-body {
      font-size: 0.95rem;
      color: var(--ink-muted);
      line-height: 1.8;
      margin-bottom: 1.5rem;
    }
    .bill-table {
      border: 1px solid var(--rule);
      background: white;
    }
    .bill-table-header {
      background: var(--ink);
      padding: 0.75rem 1.25rem;
      display: flex;
      justify-content: space-between;
    }
    .bill-table-header-label {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }
    .bill-table-rows {
      padding: 0.25rem 0;
    }
    .bill-table-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.65rem 1.25rem;
      border-bottom: 1px solid var(--rule);
    }
    .bill-table-row:last-child { border-bottom: none; }
    .bill-table-row.section-head {
      background: var(--teal-light);
      padding-top: 0.5rem;
      padding-bottom: 0.5rem;
    }
    .bill-table-label {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--neutral);
    }
    .bill-table-label.section {
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--teal);
    }
    .bill-table-val {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--ink);
    }
    .bill-table-val.neg { color: var(--red); }
    .bill-table-val.pos { color: var(--green); }
    .bill-table-divider {
      border: none;
      border-top: 1px solid var(--teal-mid);
      margin: 0.1rem 1.25rem;
    }
    .bill-link {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--teal);
      border-bottom: 1px solid var(--teal-mid);
      padding-bottom: 2px;
      transition: border-color 0.15s;
    }
    .bill-link:hover { border-color: var(--teal); }

    /* ============================================================
       FOOTER
    ============================================================ */
    .footer { border-top: 1px solid var(--rule); }
    .footer-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 3rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 2rem;
    }
    .footer-brand-name {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 0.5rem;
    }
    .footer-brand-desc {
      font-size: 0.8rem;
      color: var(--neutral);
      max-width: 28ch;
      line-height: 1.6;
    }
    .footer-links { display: flex; gap: 2rem; }
    .footer-col-label {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--neutral);
      margin-bottom: 1rem;
    }
    .footer-col ul { list-style: none; display: flex; flex-direction: column
